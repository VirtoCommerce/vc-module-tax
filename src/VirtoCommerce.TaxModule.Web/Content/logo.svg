<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128" role="img" aria-label="Tax">
  <title>Tax</title>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="92%" y2="100%">
      <stop offset="0%" stop-color="#FFC24D"/>
      <stop offset="100%" stop-color="#ED8A12"/>
    </linearGradient>
    <filter id="lift" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="3" stdDeviation="3.5" flood-color="#7A3D00" flood-opacity="0.30"/>
    </filter>
  </defs>

  <rect width="128" height="128" rx="28" fill="url(#bg)"/>

  <g transform="translate(64,62)" filter="url(#lift)">
    <!-- Receipt -->
    <path d="M-35,-42 H35 V32 l-5,6 l-5,-6 l-5,6 l-5,-6 l-5,6 l-5,-6 l-5,6 l-5,-6 l-5,6 l-5,-6 l-5,6 l-5,-6 l-5,6 l-5,-6 V-42 Z" fill="#ffffff"/>

    <!-- Title + items -->
    <line x1="-24" y1="-30" x2="14" y2="-30" stroke="#9FB6CC" stroke-width="4.5" stroke-linecap="round"/>
    <line x1="-24" y1="-16" x2="2" y2="-16" stroke="#CBD8E6" stroke-width="4" stroke-linecap="round"/>
    <line x1="12" y1="-16" x2="24" y2="-16" stroke="#5FC8F5" stroke-width="4" stroke-linecap="round"/>
    <line x1="-24" y1="-4" x2="2" y2="-4" stroke="#CBD8E6" stroke-width="4" stroke-linecap="round"/>
    <line x1="12" y1="-4" x2="24" y2="-4" stroke="#FFC24D" stroke-width="4" stroke-linecap="round"/>

    <!-- Tax % badge -->
    <circle cx="13" cy="16" r="14" fill="#2FA85A"/>
    <circle cx="8" cy="11" r="3" fill="none" stroke="#ffffff" stroke-width="2.4"/>
    <circle cx="18" cy="21" r="3" fill="none" stroke="#ffffff" stroke-width="2.4"/>
    <line x1="19" y1="9" x2="7" y2="23" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
  </g>
</svg>
